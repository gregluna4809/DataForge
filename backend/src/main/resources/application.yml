spring:
  application:
    name: dataforge-backend

  datasource:
    url: ${DATAFORGE_DB_URL:jdbc:postgresql://localhost:5432/dataforge}
    username: ${DATAFORGE_DB_USERNAME:dataforge}
    password: ${DATAFORGE_DB_PASSWORD:root123}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: ${DATAFORGE_UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${DATAFORGE_UPLOAD_MAX_FILE_SIZE:10MB}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

dataforge:
  security:
    jwt:
      secret: ${DATAFORGE_JWT_SECRET:dataforge-local-development-secret-change-before-production-64chars}
      expiration-minutes: ${DATAFORGE_JWT_EXPIRATION_MINUTES:60}
  uploads:
    directory: ${DATAFORGE_UPLOAD_DIRECTORY:./data/uploads}
    max-file-size-bytes: ${DATAFORGE_UPLOAD_MAX_FILE_SIZE_BYTES:10485760}
  ai:
    ollama:
      endpoint: ${DATAFORGE_OLLAMA_ENDPOINT:http://localhost:11434}
      model: ${DATAFORGE_OLLAMA_MODEL:llama3.1}
      timeout-seconds: ${DATAFORGE_OLLAMA_TIMEOUT_SECONDS:10}

server:
  port: ${DATAFORGE_SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
