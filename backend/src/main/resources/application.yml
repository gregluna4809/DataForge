spring:
  application:
    name: dataforge-backend

  datasource:
    url: ${DATAFORGE_DB_URL:jdbc:postgresql://localhost:5432/dataforge}
    username: ${DATAFORGE_DB_USERNAME:dataforge}
    password: ${DATAFORGE_DB_PASSWORD:dataforge}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${DATAFORGE_SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
